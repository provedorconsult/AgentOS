name: AgentOS CI

permissions:
  contents: read

concurrency:
  group: agentos-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    timeout-minutes: 10
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci
      - name: Dependency audit
        run: npm audit --audit-level=moderate
      - name: Doctor
        run: npm run doctor
      - name: Validate
        run: npm run validate
      - name: Diff hygiene
        run: git diff --check
      - name: Clean worktree
        shell: bash
        run: test -z "$(git status --porcelain)"
