name: AgentOS CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci
      - name: Doctor
        run: npm run doctor
      - name: Validate
        run: npm run validate
      - name: Diff hygiene
        run: git diff --check
      - name: Clean worktree
        shell: bash
        run: test -z "$(git status --porcelain)"
