name: AgentOS CI

permissions:
  contents: read

concurrency:
  group: agentos-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    timeout-minutes: 10
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci
      - name: Dependency audit
        run: npm audit --audit-level=moderate
      - name: Doctor
        run: npm run doctor
      - name: Validate
        run: npm run validate
      - name: Diff hygiene
        run: git diff --check
      - name: Clean worktree
        shell: bash
        run: test -z "$(git status --porcelain)"
