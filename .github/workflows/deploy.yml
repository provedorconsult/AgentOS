name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "staging"

jobs:
  deploy:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deployment placeholder
        shell: pwsh
        run: ./scripts/deploy.ps1 -Environment "${{ inputs.environment }}"
